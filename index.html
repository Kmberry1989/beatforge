<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BeatForge</title>
<style>body{margin:0;background:#0a0a0f;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center}h1{font-size:3rem;background:linear-gradient(90deg,#0ff,#f0f);-webkit-background-clip:text;-webkit-text-fill-color:transparent}a{color:#0ff;margin:0 10px}</style>
</head>
<body>
<div><h1>BeatForge</h1><p id="m">Loading...</p><p><a href="desktop/">Desktop</a> | <a href="mobile/">Mobile</a></p></div>
<script>
const mobile = /Mobi|Android/i.test(navigator.userAgent) || innerWidth < 768;
document.getElementById('m').textContent = 'Redirecting to ' + (mobile ? 'mobile' : 'desktop');
location.replace(mobile ? 'mobile/' : 'desktop/');
</script>
</body>
</html>
